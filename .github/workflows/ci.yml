name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @sadafgold/api prisma:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sadaf_gold?schema=public
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sadaf_gold?schema=public

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sadaf_gold?schema=public
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sadaf_gold?schema=public
          JWT_ACCESS_SECRET: ci-access-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-characters-long
          NEXT_PUBLIC_API_BASE_URL: https://api.sadafgold.com/api/v1
          NEXT_PUBLIC_WS_BASE_URL: https://api.sadafgold.com
