name: sadaf-gold-prod

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"
    labels: "service,environment"

x-restart: &restart-policy
  restart: unless-stopped

services:
  postgres:
    <<: *restart-policy
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sadafgold
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    <<: *restart-policy
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - sadafgold
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  minio:
    <<: *restart-policy
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - sadafgold
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    <<: *restart-policy
    image: ${API_IMAGE:-sadafgold-api:prod}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      TRUST_PROXY: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      WEB_URL: ${WEB_URL}
      ADMIN_URL: ${ADMIN_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - sadafgold
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1G

  web:
    <<: *restart-policy
    image: ${WEB_IMAGE:-sadafgold-web:prod}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Sadaf Gold}
        NEXT_PUBLIC_GOLD_TRADE_COMMISSION_PERCENT: ${NEXT_PUBLIC_GOLD_TRADE_COMMISSION_PERCENT:-0.5}
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sadafgold
    logging: *default-logging
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768M

  admin:
    <<: *restart-policy
    image: ${ADMIN_IMAGE:-sadafgold-admin:prod}
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_ADMIN_APP_NAME: ${NEXT_PUBLIC_ADMIN_APP_NAME:-Sadaf Gold Admin}
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "3001"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sadafgold
    logging: *default-logging
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3001',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768M

  worker:
    <<: *restart-policy
    image: ${WORKER_IMAGE:-sadafgold-worker:prod}
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - sadafgold
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node dist/main' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    <<: *restart-policy
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    environment:
      RETAIL_DOMAIN: ${RETAIL_DOMAIN:-retail.sadafgold.com}
      WHOLESALE_DOMAIN: ${WHOLESALE_DOMAIN:-wholesale.sadafgold.com}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-admin.sadafgold.com}
      API_DOMAIN: ${API_DOMAIN:-api.sadafgold.com}
      CERT_NAME: ${CERT_NAME:-sadafgold}
    volumes:
      - ./docker/nginx/templates/00-upstreams.conf.template:/etc/nginx/templates/00-upstreams.conf.template:ro
      - ./docker/nginx/templates/http/10-http.conf.template:/etc/nginx/templates/10-http.conf.template:ro
      - ./docker/nginx/snippets:/etc/nginx/snippets:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      web:
        condition: service_healthy
      admin:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - sadafgold
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  sadafgold:
    driver: bridge

  certbot:
    image: certbot/certbot:latest
    profiles: ["tools"]
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    networks:
      - sadafgold

volumes:
  postgres_data:
  redis_data:
  minio_data:
  certbot_www:
  certbot_conf:
